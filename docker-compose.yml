services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: morf_app
    working_dir: /var/www/html
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-morf}
      DB_USERNAME: ${DB_USERNAME:-morf_user}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      FILESYSTEM_DISK: local
    volumes:
      - app_storage:/var/www/html/storage/app/public
    depends_on:
      - db
      - redis
    networks:
      - morf_network

  web:
    image: nginx:alpine
    container_name: morf_web
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - app_storage:/var/www/html/storage/app/public:ro
    depends_on:
      - app
    networks:
      - morf_network

  db:
    image: postgres:16-alpine
    container_name: morf_db
    environment:
      POSTGRES_DB: ${DB_DATABASE:-morf}
      POSTGRES_USER: ${DB_USERNAME:-morf_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - morf_network

  redis:
    image: redis:7-alpine
    container_name: morf_redis
    networks:
      - morf_network

  frontend:
    build:
      context: ./morf_front
      dockerfile: Dockerfile
    container_name: morf_frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - API_HOST=web
      - API_PORT=80
    depends_on:
      - web
    networks:
      - morf_network

volumes:
  db_data:
  app_storage:

networks:
  morf_network:
    driver: bridge
